{% extends 'base.html' %}

{% block extra_css %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 2rem;
    }

    .auth-card {
        width: 100%;
        max-width: 450px;
        background: var(--card-bg);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 3rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .auth-tabs {
        display: flex;
        gap: 1rem;
        margin-bottom: 2.5rem;
        background: var(--glass);
        padding: 0.5rem;
        border-radius: 12px;
    }

    .auth-tab {
        flex: 1;
        padding: 0.8rem;
        text-align: center;
        cursor: pointer;
        border-radius: 8px;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .auth-tab.active {
        background: var(--primary);
        color: white;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--text-muted);
        font-size: 0.9rem;
    }

    .form-group input {
        width: 100%;
        padding: 1rem;
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        color: black;
        transition: border-color 0.3s ease;
    }

    .form-group input:focus {
        outline: none;
        border-color: var(--primary);
    }

    .auth-btn {
        width: 100%;
        padding: 1rem;
        margin-top: 1rem;
        background: linear-gradient(to right, var(--primary), var(--secondary));
        border: none;
        border-radius: 12px;
        color: white;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s ease;
    }

    .auth-btn:active {
        transform: scale(0.98);
    }

    #signup-form {
        display: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card animate-fade-in">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-size: 2rem; background: linear-gradient(to right, #6366f1, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                Welcome to HireStream
            </h1>
            <p style="color: var(--text-muted);">Your automated HR journey starts here</p>
        </div>

        <div class="auth-tabs">
            <div class="auth-tab active" onclick="toggleAuth('login')">Login</div>
            <div class="auth-tab" onclick="toggleAuth('signup')">Sign Up</div>
        </div>

        <!-- Login Form -->
        <form id="login-form" action="/login" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="hr@company.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-btn">Sign In</button>
        </form>

        <!-- Signup Form -->
        <form id="signup-form" action="/signup" method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="username" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="hr@company.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-btn">Create Account</button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function toggleAuth(type) {
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const tabs = document.querySelectorAll('.auth-tab');

        if (type === 'login') {
            loginForm.style.display = 'block';
            signupForm.style.display = 'none';
            tabs[0].classList.add('active');
            tabs[1].classList.remove('active');
        } else {
            loginForm.style.display = 'none';
            signupForm.style.display = 'block';
            tabs[0].classList.remove('active');
            tabs[1].classList.add('active');
        }
    }
</script>
{% endblock %}
